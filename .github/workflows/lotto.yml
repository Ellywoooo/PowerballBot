name: Lotto Powerball Bot

on:
  schedule:
    # Wed & Sat 09:00 UTC (~9-10pm NZ draw night; adjust if needed)
    - cron: "0 9 * * 3"
    - cron: "0 9 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-docker.txt

      - name: Run Powerball bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated draw data
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/draws_clean.csv
          git diff --staged --quiet || git commit -m "chore: update draws_clean.csv from scheduled run"
          git push
