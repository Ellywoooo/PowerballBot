# GitHub Actions workflow to run the Lotto Powerball Bot
# Cron times are UTC. NZ is UTC+12 in winter (NZST), UTC+13 in summer (NZDT).

name: Lotto Powerball Bot

on:
  schedule:
    # Start early to absorb GitHub Actions cron delay (often 1-2h late).
    # Prediction target ~3pm NZ: fire at 1:00pm NZST (01:00 UTC) Wed/Sat
    - cron: "0 1 * * 3"
    - cron: "0 1 * * 6"
    # Results target ~9:30pm NZ: fire at 8:00pm NZST (08:00 UTC) Wed/Sat
    # (after ~7:30pm sales close, so draw is more likely published)
    - cron: "0 8 * * 3"
    - cron: "0 8 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to send to Slack"
        type: choice
        required: true
        default: predict
        options:
          - predict
          - results

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-docker.txt

      - name: Run Powerball bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            case "${{ github.event.schedule }}" in
              "0 1 * * 3"|"0 1 * * 6") MODE="predict" ;;
              "0 8 * * 3"|"0 8 * * 6") MODE="results" ;;
              *) MODE="predict" ;;
            esac
          fi
          echo "Running mode=$MODE"
          python main.py --mode "$MODE"

      - name: Commit updated data
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/draws_clean.csv predictions/
          git diff --staged --quiet || git commit -m "chore: update draw data and predictions from scheduled run"
          git push origin HEAD:main
